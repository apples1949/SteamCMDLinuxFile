name: SteamCMD Upload

on:
  workflow_dispatch:  # 仅保留手动触发

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Setup Environment
      run: |
        sudo apt-get update
        sudo apt-get install -y lib32gcc-s1 python3-pip
        sudo timedatectl set-timezone Asia/Shanghai

    - name: Install Python Dependencies
      run: |
        pip3 install requests base58 pycryptodomex

    - name: Prepare Directories
      run: |
        mkdir -p "$GITHUB_WORKSPACE/build"  
        WORKDIR="$HOME/steamcmd_build"
        mkdir -p "$WORKDIR"
        cd "$WORKDIR"
        echo "Current dir: $(pwd)"

    - name: Download SteamCMD
      run: |
        cd "$HOME/steamcmd_build"
        wget -q https://steamcdn-a.akamaihd.net/client/installer/steamcmd_linux.tar.gz
        tar -xzf steamcmd_linux.tar.gz
        rm steamcmd_linux.tar.gz
        ./steamcmd.sh +quit
        chmod -R a+r *

    - name: Create SteamCMD Package
      run: |
        tar -czvf "$GITHUB_WORKSPACE/build/steamcmd_linux.tar.gz" \
          --exclude='linux32/steamclient.so' \
          -C "$HOME/steamcmd_build" \
          linux32 \
          package \
          steamcmd.sh
    
        ls -lh "$GITHUB_WORKSPACE/build"
        echo "Package path: $GITHUB_WORKSPACE/build/steamcmd_linux.tar.gz"

    - name: Compress Package Contents
      run: |
        cd "$HOME/steamcmd_build"
        (cd package && tar -czvf ../package.tar.gz ./*)
        mv package.tar.gz "$GITHUB_WORKSPACE/build/"
        ls -lh "$GITHUB_WORKSPACE/build"
        echo "Package path: $GITHUB_WORKSPACE/build/package.tar.gz"
        
    - name: Upload Package via Script
      run: |
        cd "$GITHUB_WORKSPACE"
        wegt -q https://raw.githubusercontent.com/Aruelius/wenshushu/refs/heads/master/wss.py
        # 运行上传命令并捕获完整输出
        python3 wss.py upload build/steamcmd_linux.tar.gz > upload_output.log 2>&1
        
        # 显示完整上传日志
        echo "===== 完整上传日志 ====="
        cat upload_output.log
        echo "======================"
        
        # 提取关键信息
        SPACE_INFO=$(grep "当前已用空间" upload_output.log || echo "")
        LINKS=$(grep -E "个人管理链接|公共链接" upload_output.log || echo "")
        
        # 保存到环境变量
        echo "UPLOAD_OUTPUT<<EOF" >> $GITHUB_ENV
        echo -e "$SPACE_INFO" >> $GITHUB_ENV
        echo -e "$LINKS" >> $GITHUB_ENV
        echo "EOF" >> $GITHUB_ENV
        
        # 显示提取结果
        echo -e "\n📤 提取的上传结果："
        echo -e "$SPACE_INFO"
        echo -e "$LINKS"
        
    - name: Update README with Upload Result
      run: |
        # 创建/更新上传结果部分
        SECTION_START="<!-- UPLOAD_RESULT_START -->"
        SECTION_END="<!-- UPLOAD_RESULT_END -->"
        
        # 创建新的结果块
        NEW_CONTENT="$SECTION_START\n\n## 最新上传结果\n\n\`\`\`"
        NEW_CONTENT+="\n$UPLOAD_OUTPUT\n"
        NEW_CONTENT+="\`\`\`\n\n$SECTION_END"
        
        # 如果存在现有结果则替换，否则追加
        if grep -q "$SECTION_START" README.md; then
          sed -i "/$SECTION_START/,/$SECTION_END/c\\$NEW_CONTENT" README.md
        else
          echo -e "\n$NEW_CONTENT" >> README.md
        fi
        
        echo "✅ README已更新"
        echo "更新内容："
        echo -e "$NEW_CONTENT"
        
    - name: Commit & Push
      run: |
        cd "$GITHUB_WORKSPACE"
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@users.noreply.github.com"

        git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

        if [ -n "$(git status --porcelain build/ README.md)" ]; then
          git add build/ README.md
          git commit -m "🤖 Auto Update SteamCMD ($(date +'%Y-%m-%d %H:%M'))"
          git pull --rebase origin test
          git push origin HEAD:test
          echo "🚀 更改已推送"
        else
          echo "🟢 无更改可提交"
        fi
