name: SteamCMD Force Reset

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */4 * * *'

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout with .git
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        clean: false
        sparse-checkout: "" 

    - name: Purge Existing Files
      run: |
        find . -mindepth 1 -depth ! -name '.git' ! -name '.git/*' -exec rm -rf {} +
        
        git rm -r --cached .
        git clean -fdx

    - name: Create New Structure
      run: |
        mkdir -p steamcmd packages
        echo "v2.0" > version.txt

    - name: Setup Environment
      run: |
        sudo apt-get update
        sudo apt-get install -y lib32gcc-s1
        sudo timedatectl set-timezone Asia/Shanghai

    - name: Process SteamCMD
      run: |
        TEMP_DIR=$(mktemp -d)
        cd $TEMP_DIR

        wget -q https://steamcdn-a.akamaihd.net/client/installer/steamcmd_linux.tar.gz
        tar -xzf steamcmd_linux.tar.gz
        rm steamcmd_linux.tar.gz
        ./steamcmd.sh +quit

        tar -czvf $GITHUB_WORKSPACE/steamcmd/steamcmd_linux.tar.gz \
          --exclude='linux32/steamclient.so' \
          linux32 steamcmd.sh

        cd package
        tar -czvf $GITHUB_WORKSPACE/packages/package.tar.gz ./*

    - name: Atomic Commit
      run: |
        git config --global user.name "Robotic Deployer"
        git config --global user.email "noreply@steamcmd.mirror"
        git add -A
        git commit --allow-empty -m "🚀 SteamCMD Release $(date +'%Y-%m-%dT%H:%M:%S%z')"
        git push origin HEAD:main --force --no-verify
        git remote remove origin
